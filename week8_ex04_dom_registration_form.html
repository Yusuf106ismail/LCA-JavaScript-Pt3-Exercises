<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Registration Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #0056b3;
      }
      .error-message {
        color: #dc3545;
        font-size: 14px;
        margin-top: 5px;
        min-height: 18px;
      }
      #formMessage {
        font-weight: bold;
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 4px;
        text-align: center;
      }
      .success-banner {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .input-error {
        border-color: #dc3545;
      }
    </style>
  </head>
  <body>
    <h1>Register Your Account</h1>

    <div id="formMessage"></div>

    <form id="registrationForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" />
        <div id="usernameError" class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
        <div id="emailError" class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" />
        <div id="passwordError" class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" />
        <div id="confirmPasswordError" class="error-message"></div>
      </div>

      <button type="submit" id="submitBtn">Register</button>
    </form>

    <script>
      // Get DOM elements
      const form = document.getElementById("registrationForm");
      const formMessage = document.getElementById("formMessage");

      const usernameInput = document.getElementById("username");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");

      const usernameError = document.getElementById("usernameError");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const confirmPasswordError = document.getElementById(
        "confirmPasswordError",
      );

      // Task 2: Listen for submit event
      form.addEventListener("submit", function (event) {
        // Prevent the default form submission behavior (page reload)
        event.preventDefault();

        // Task 3: Clear any previous error messages, styles, and success messages
        resetFormVisuals();

        // Flag to track validation status
        let isValid = true;

        // Fetch current values (trimmed to remove accidental whitespace)
        const usernameValue = usernameInput.value.trim();
        const emailValue = emailInput.value.trim();
        const passwordValue = passwordInput.value;
        const confirmPasswordValue = confirmPasswordInput.value;

        // Task 3 & 4: Validate Username
        if (usernameValue === "") {
          showError(usernameInput, usernameError, "Username cannot be empty");
          isValid = false;
        }

        // Task 3 & 4: Validate Email
        if (emailValue === "") {
          showError(emailInput, emailError, "Email cannot be empty");
          isValid = false;
        } else if (!emailValue.includes("@")) {
          showError(emailInput, emailError, "Email must contain an '@' symbol");
          isValid = false;
        }

        // Task 3 & 4: Validate Password
        if (passwordValue === "") {
          showError(passwordInput, passwordError, "Password cannot be empty");
          isValid = false;
        } else if (passwordValue.length < 6) {
          showError(
            passwordInput,
            passwordError,
            "Password must be at least 6 characters long",
          );
          isValid = false;
        }

        // Task 3 & 4: Validate Confirm Password
        if (confirmPasswordValue === "") {
          showError(
            confirmPasswordInput,
            confirmPasswordError,
            "Please confirm your password",
          );
          isValid = false;
        } else if (passwordValue !== confirmPasswordValue) {
          showError(
            confirmPasswordInput,
            confirmPasswordError,
            "Passwords do not match",
          );
          isValid = false;
        }

        // Task 4: If all validations pass
        if (isValid) {
          // Display success message
          formMessage.textContent = "Registration successful!";
          formMessage.className = "success-banner";

          // Log collected form data to the console
          console.log("Form Data Submitted:", {
            username: usernameValue,
            email: emailValue,
          });

          // Optional: Clear fields on successful submission
          form.reset();
        }
      });

      // Helper function to handle displaying errors and changing borders
      function showError(inputElement, errorElement, message) {
        errorElement.textContent = message;
        inputElement.classList.add("input-error");
      }

      // Helper function to reset all error messages and border styles
      function resetFormVisuals() {
        formMessage.textContent = "";
        formMessage.className = "";

        const inputs = [
          usernameInput,
          emailInput,
          passwordInput,
          confirmPasswordInput,
        ];
        const errors = [
          usernameError,
          emailError,
          passwordError,
          confirmPasswordError,
        ];

        inputs.forEach((input) => input.classList.remove("input-error"));
        errors.forEach((error) => (error.textContent = ""));
      }
    </script>
  </body>
</html>
